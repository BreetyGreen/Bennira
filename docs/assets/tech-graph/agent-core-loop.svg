<text x="710.0" y="446.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="710.0" dy="0">执行行动</tspan>
</text>
<text x="710.0" y="468.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
