</text>
<ellipse cx="250.0" cy="554" rx="90.0" ry="14" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<path d="M 160,554 L 160,596 Q 250.0,620 340,596 L 340,554" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<ellipse cx="250.0" cy="596" rx="90.0" ry="14" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="160" y="552" width="4" height="44" fill="#1d4ed8"/>
<text x="250.0" y="569.0" text-anchor="middle" fill="#0d0d0d" font-size="14" font-weight="650">
  <tspan x="250.0" dy="0">更新记忆</tspan>
</text>
<text x="250.0" y="590.0" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="250.0" dy="0">日志 / 文档</tspan>
</text>
<rect x="390" y="630" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="390" y="630" width="4" height="58" rx="2" ry="2" fill="#10a37f"/>
<text x="480.0" y="651.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="480.0" dy="0">继续或停止</tspan>
</text>
<text x="480.0" y="673.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
  <tspan x="480.0" dy="0">交接 / 总结</tspan>
</text>
<line x1="480" y1="163" x2="480" y2="195" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
<line x1="480" y1="253" x2="480" y2="310" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
<line x1="390" y1="339" x2="340" y2="339" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<text x="365.0" y="331.0" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="365.0" dy="0">读取</tspan>
</text>
<line x1="570" y1="339" x2="620" y2="339" stroke="#f97316" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
<text x="595.0" y="331.0" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="595.0" dy="0">调用</tspan>
</text>
<line x1="710" y1="368" x2="710" y2="425" stroke="#f97316" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
<path d="M 710,483 L 710,515 L 480,515 L 480,540" fill="none" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<text x="480" y="507" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="480" dy="0">结果</tspan>
</text>
<line x1="390" y1="569" x2="340" y2="569" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<text x="365.0" y="561.0" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="365.0" dy="0">沉淀</tspan>
</text>
<line x1="480" y1="598" x2="480" y2="630" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
<path d="M 250,540 L 250,465 L 390,465 L 390,339" fill="none" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<text x="390" y="457" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="390" dy="0">反馈</tspan>
</text>
<path d="M 480,630 L 835,630 L 835,195 L 570,195" fill="none" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
<text x="835" y="187" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="835" dy="0">继续</tspan>
</text>
<line x1="250" y1="690" x2="284" y2="690" stroke="#10a37f" stroke-width="1.8" marker-end="url(#arrow-green)"/>
<text x="296" y="694" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="296" dy="0">主路径</tspan>
</text>
<line x1="366" y1="690" x2="400" y2="690" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
<text x="412" y="694" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="412" dy="0">读取/上下文</tspan>
</text>
<line x1="482" y1="690" x2="516" y2="690" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<text x="528" y="694" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="528" dy="0">写入/行动</tspan>
</text>
<line x1="598" y1="690" x2="632" y2="690" stroke="#71717a" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
<text x="644" y="694" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="644" dy="0">未来/辅助</tspan>
</text>
</svg>
