<text x="480.0" y="561.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="480.0" dy="0">观察结果</tspan>
</text>
<text x="480.0" y="583.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
