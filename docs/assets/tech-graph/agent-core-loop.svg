</text>
<rect x="620" y="310" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="620" y="310" width="4" height="58" rx="2" ry="2" fill="#f97316"/>
<text x="710.0" y="331.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
