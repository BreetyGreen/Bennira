<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
<defs>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#71717a"/>
</marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#10a37f"/>
</marker>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
</marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
</marker>
</defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
</style>
<rect width="960" height="720" fill="#ffffff"/>
<text x="480.0" y="40" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="650">
  <tspan x="480.0" dy="0">Agent Core 循环图</tspan>
</text>
<text x="480.0" y="66" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">
  <tspan x="480.0" dy="0">接收任务、收集上下文、行动、观察结果，再决定继续或停止</tspan>
</text>
<rect x="390" y="105" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="390" y="105" width="4" height="58" rx="2" ry="2" fill="#10a37f"/>
<text x="480.0" y="126.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="480.0" dy="0">接收任务</tspan>
</text>
<text x="480.0" y="148.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
  <tspan x="480.0" dy="0">用户输入</tspan>
</text>
<rect x="390" y="195" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="390" y="195" width="4" height="58" rx="2" ry="2" fill="#10a37f"/>
<text x="480.0" y="216.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="480.0" dy="0">理解目标</tspan>
</text>
<text x="480.0" y="238.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
  <tspan x="480.0" dy="0">澄清边界</tspan>
</text>
<rect x="160" y="310" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="160" y="310" width="4" height="58" rx="2" ry="2" fill="#1d4ed8"/>
<text x="250.0" y="331.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="250.0" dy="0">收集上下文</tspan>
</text>
<text x="250.0" y="353.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
  <tspan x="250.0" dy="0">文档 / 搜索</tspan>
</text>
<rect x="390" y="310" width="180" height="58" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="390" y="310" width="4" height="58" rx="2" ry="2" fill="#10a37f"/>
<text x="480.0" y="331.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="480.0" dy="0">制定计划</tspan>
</text>
<text x="480.0" y="353.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
