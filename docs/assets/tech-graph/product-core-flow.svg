</text>
<rect x="55" y="160" width="110" height="66" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="55" y="160" width="4" height="66" rx="2" ry="2" fill="#10a37f"/>
<text x="110.0" y="185.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="110.0" dy="0">想法</tspan>
</text>
<text x="110.0" y="207.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
  <tspan x="110.0" dy="0">用户原始表达</tspan>
</text>
<line x1="165" y1="193" x2="195" y2="193" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
<rect x="195" y="160" width="110" height="66" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="195" y="160" width="4" height="66" rx="2" ry="2" fill="#10a37f"/>
<text x="250.0" y="185.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="250.0" dy="0">定位</tspan>
</text>
<text x="250.0" y="207.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
