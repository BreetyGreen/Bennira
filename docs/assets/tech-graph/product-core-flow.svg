</text>
<line x1="865" y1="193" x2="895" y2="193" stroke="#f97316" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
<rect x="895" y="160" width="110" height="66" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="895" y="160" width="4" height="66" rx="2" ry="2" fill="#f97316"/>
<text x="950.0" y="185.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
  <tspan x="950.0" dy="0">验证</tspan>
</text>
<text x="950.0" y="207.0" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="400">
