</text>
<line x1="725" y1="193" x2="755" y2="193" stroke="#f97316" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
<rect x="755" y="160" width="110" height="66" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
