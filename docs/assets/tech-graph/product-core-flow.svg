</text>
<line x1="602" y1="365" x2="636" y2="365" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
<text x="648" y="369" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="648" dy="0">写入/行动</tspan>
</text>
<line x1="718" y1="365" x2="752" y2="365" stroke="#71717a" stroke-width="1.8" marker-end="url(#arrow-gray)"/>
<text x="764" y="369" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
