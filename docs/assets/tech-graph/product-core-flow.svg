</text>
<path d="M 1090,226 L 1090,310 L 670,310 L 670,226" fill="none" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<text x="670" y="302" text-anchor="middle" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="670" dy="0">恢复继续</tspan>
</text>
<line x1="370" y1="365" x2="404" y2="365" stroke="#10a37f" stroke-width="1.8" marker-end="url(#arrow-green)"/>
<text x="416" y="369" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
  <tspan x="416" dy="0">主路径</tspan>
</text>
<line x1="486" y1="365" x2="520" y2="365" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
<text x="532" y="369" text-anchor="start" fill="#6e6e80" font-size="11" font-weight="400">
