</text>
<line x1="1005" y1="193" x2="1035" y2="193" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
<rect x="1035" y="160" width="110" height="66" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
<rect x="1035" y="160" width="4" height="66" rx="2" ry="2" fill="#1d4ed8"/>
<text x="1090.0" y="185.0" text-anchor="middle" fill="#0d0d0d" font-size="15" font-weight="650">
